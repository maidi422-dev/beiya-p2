<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>题目详情 · 北雅雅思 P2</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --beiya:#C0392B;
    --beiya-dark:#9B2C20;
    --beiya-soft:#FDECEA;
    --gold:#B8894A;
    --gold-soft:#FBF4EA;
    --ink:#1E1E22;
    --ink-2:#4A4A52;
    --ink-3:#8A8A92;
    --line:#E8E8EC;
    --bg:#FAFAFA;
    --white:#FFFFFF;
    --ok:#2E7D32;
    --pending:#E8834A;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Inter','PingFang SC','Microsoft YaHei',system-ui,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.7;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none;cursor:pointer}

  /* ─── TOP BAR ─── */
  .topbar{
    position:sticky;top:0;z-index:40;background:var(--white);
    border-bottom:1px solid var(--line);
    padding:14px 24px;display:flex;align-items:center;gap:24px;
  }
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;color:var(--beiya);white-space:nowrap}
  .brand-mark{width:28px;height:28px;background:var(--beiya);color:#fff;
    display:flex;align-items:center;justify-content:center;border-radius:4px;
    font-family:'Noto Serif SC',serif;font-size:14px}
  .nav{display:flex;gap:2px;margin-left:8px;flex:1}
  .nav a{padding:7px 14px;border-radius:6px;font-size:13px;color:var(--ink-2);font-weight:500;white-space:nowrap}
  .nav a:hover{background:var(--beiya-soft);color:var(--beiya)}
  .nav a.active{background:var(--beiya);color:#fff}
  .search-wrap{position:relative;margin-left:auto}
  .search{
    background:#F4F4F6;border:1px solid transparent;border-radius:20px;
    padding:7px 14px 7px 36px;font-size:12.5px;width:220px;
    color:var(--ink);font-family:inherit;outline:none;transition:all .2s
  }
  .search:focus{background:#fff;border-color:var(--beiya);width:280px}
  .search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--ink-3);font-size:13px;pointer-events:none}

  /* ─── LAYOUT ─── */
  .wrap{max-width:900px;margin:0 auto;padding:28px 24px 80px}
  .crumb{font-size:12px;color:var(--ink-3);margin-bottom:14px;letter-spacing:0.3px}
  .crumb a{color:var(--ink-3)}
  .crumb a:hover{color:var(--beiya)}

  /* ─── Q HEADER ─── */
  .q-header{
    background:var(--white);border:1px solid var(--line);border-radius:12px;
    padding:28px 32px;margin-bottom:20px;position:relative;overflow:hidden;
  }
  .q-header::before{
    content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--beiya)
  }
  .q-title{
    font-family:'Noto Serif SC','Inter',serif;font-size:22px;font-weight:700;
    line-height:1.4;color:var(--ink);margin-bottom:14px
  }
  .q-title-en{font-style:italic;color:var(--beiya)}
  .q-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
  .tag{
    display:inline-flex;align-items:center;gap:4px;
    padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500
  }
  .tag-story{background:var(--beiya-soft);color:var(--beiya)}
  .tag-cat{background:#EDF4FF;color:#2E3B6B}
  .q-actions{display:flex;gap:8px;margin-top:14px;padding-top:14px;border-top:1px dashed var(--line);flex-wrap:wrap}
  .act{
    display:inline-flex;align-items:center;gap:6px;padding:6px 12px;
    border:1px solid var(--line);border-radius:20px;font-size:12px;
    background:var(--white);cursor:pointer;transition:all .15s;
    color:var(--ink-2);font-weight:500
  }
  .act:hover{border-color:var(--beiya);color:var(--beiya)}
  .act.on.fav{background:#FFF8E6;border-color:#E8C96A;color:#8A6A10}
  .act.on.done{background:#E8F5E9;border-color:#A5D6A7;color:var(--ok)}
  .act.on.review{background:#FFF3E0;border-color:#FFCC80;color:var(--pending)}

  /* ─── PREP WORDS ─── */
  .prep-strip{
    background:var(--gold-soft);border:1px solid #EAD9B8;border-radius:10px;
    padding:14px 18px;margin-bottom:20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center
  }
  .prep-label{font-size:12px;font-weight:700;color:var(--gold);margin-right:4px}
  .prep-chip{
    background:var(--white);padding:4px 10px;border-radius:6px;font-size:13px;
    cursor:pointer;border:1px solid #EAD9B8;transition:all .15s;font-weight:500
  }
  .prep-chip:hover{background:var(--gold);color:#fff;border-color:var(--gold)}

  /* ─── OUTLINE TIER TABS ─── */
  .tier-tabs{
    display:flex;gap:0;background:var(--white);border:1px solid var(--line);
    border-radius:10px;padding:4px;margin-bottom:12px;overflow-x:auto
  }
  .tier-tab{
    padding:8px 14px;border-radius:7px;font-size:13px;font-weight:500;
    cursor:pointer;color:var(--ink-3);transition:all .15s;white-space:nowrap;flex-shrink:0
  }
  .tier-tab.active{background:var(--beiya);color:#fff}
  .tier-tab:not(.active):hover{color:var(--beiya)}
  .tier-hint{
    font-size:12px;color:var(--ink-3);margin-bottom:16px;display:flex;align-items:center;gap:6px;
    padding:2px 4px;font-style:italic
  }

  /* ─── OUTLINE SECTIONS ─── */
  .outline{display:none}
  .outline.active{display:block}

  .sec{
    background:var(--white);border:1px solid var(--line);border-radius:10px;
    margin-bottom:14px;overflow:hidden
  }
  .sec-head{
    display:flex;align-items:center;gap:14px;padding:14px 18px;
    border-bottom:1px solid var(--line);background:#FCFCFD
  }
  .sec-badge{
    width:40px;height:40px;border-radius:50%;
    background:var(--beiya);color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-family:'Noto Serif SC',serif;font-size:15px;font-weight:700;flex-shrink:0
  }
  .sec-s3 .sec-badge{background:var(--gold)}
  .sec-s3 .sec-head{background:var(--gold-soft)}
  .sec-meta{flex:1;min-width:0}
  .sec-label{font-size:11px;letter-spacing:2px;color:var(--ink-3);font-weight:600;text-transform:uppercase}
  .sec-marker-line{font-size:14px;color:var(--gold);font-weight:600;margin-top:2px;font-style:italic}
  .main-stage{font-size:10px;background:var(--gold);color:#fff;padding:2px 8px;border-radius:4px;margin-left:6px;letter-spacing:1px;font-weight:700}

  .sec-body{padding:14px 22px}
  .bullet{
    position:relative;padding:6px 0 6px 24px;font-size:14.5px;line-height:1.8;color:var(--ink-2)
  }
  .bullet::before{
    content:'→';position:absolute;left:0;color:var(--beiya);font-weight:700
  }
  /* 同义替换 hover 提示（仅 detailed tier 使用） */
  .alt{
    color:var(--gold-dark);border-bottom:1.5px dotted var(--gold);
    cursor:help;position:relative;font-weight:500;padding:0 1px;transition:background .12s
  }
  .alt:hover{background:var(--gold-soft);border-radius:2px}
  .alt-pop{
    display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
    background:#1E1E22;color:#fff;padding:6px 12px;border-radius:6px;font-size:12.5px;
    white-space:nowrap;z-index:100;font-style:italic;font-weight:400;pointer-events:none;
    letter-spacing:.2px;box-shadow:0 4px 14px rgba(0,0,0,.2)
  }
  .alt-pop::before{content:'↔ ';opacity:.6;font-style:normal}
  .alt-pop::after{
    content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
    border:5px solid transparent;border-top-color:#1E1E22
  }
  .alt:hover .alt-pop{display:block}
  .sec-s3 .bullet::before{color:var(--gold)}

  /* question-prompt tier styling */
  .qp-step{
    padding:10px 16px;background:#F8F8FA;border-radius:8px;margin:6px 0;
    font-size:14.5px;color:var(--ink);font-weight:500;border-left:3px solid var(--beiya)
  }
  .sec-s3 .qp-step{border-left-color:var(--gold)}
  .qp-step-q{color:var(--ink-2);margin-top:4px;font-size:13.5px;font-style:italic;font-weight:400}

  /* clickable word */
  .w{cursor:pointer;border-bottom:1px dotted transparent;transition:all .1s;padding:0 1px;border-radius:2px}
  .w:hover{background:var(--gold-soft);border-bottom-color:var(--gold)}
  .w.prep{color:var(--gold);font-weight:600;border-bottom:1px dotted var(--gold)}
  .w.prep:hover{background:var(--gold);color:#fff;border-bottom-color:transparent}

  /* ─── REFERENCE ESSAY ─── */
  .ref{
    background:var(--white);border:1px solid var(--line);border-radius:10px;
    margin-top:24px;overflow:hidden
  }
  .ref-head{
    padding:14px 20px;background:#FAFAFA;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;
    font-size:13px;font-weight:600;color:var(--ink-2)
  }
  .ref-head::after{content:'▾';margin-left:auto;transition:transform .2s;color:var(--ink-3)}
  .ref.collapsed .ref-head::after{transform:rotate(-90deg)}
  .ref-body{padding:22px 28px;font-size:14.5px;line-height:1.9;color:var(--ink-2);display:block}
  /* 参考范文内的金句高亮 */
  .ref-gold{color:var(--gold-dark);background:var(--gold-soft);padding:0 4px;border-radius:3px;font-weight:600;border-bottom:1px solid #EAD9B8}
  /* 参考范文内 S3 主战场的子标题 */
  .ref-sub{color:var(--beiya);font-weight:700;margin-right:4px;font-size:13.5px;letter-spacing:.2px}
  .ref.collapsed .ref-body{display:none}
  .ref-note{font-size:11px;color:var(--ink-3);margin-top:16px;padding-top:12px;border-top:1px dashed var(--line);font-style:italic}

  /* ─── CROSS REFS ─── */
  .xrefs{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:24px}
  .xref{
    background:var(--white);border:1px solid var(--line);border-radius:10px;padding:16px 18px;
    transition:all .15s;cursor:pointer
  }
  .xref:hover{border-color:var(--beiya);transform:translateY(-2px);box-shadow:0 4px 12px rgba(192,57,43,.08)}
  .xref-lbl{font-size:11px;color:var(--ink-3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
  .xref-main{font-size:15px;font-weight:700;color:var(--ink)}
  .xref-sub{font-size:12px;color:var(--ink-3);margin-top:6px;line-height:1.6}

  .elem-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .elem{
    background:#F4F4F6;color:var(--ink-2);padding:3px 10px;border-radius:12px;
    font-size:12px;cursor:pointer;transition:all .15s;font-weight:500
  }
  .elem:hover{background:var(--beiya);color:#fff}

  /* ─── DICT POPUP ─── */
  .dict-pop{
    position:absolute;z-index:100;background:var(--ink);color:#fff;
    border-radius:10px;padding:14px 18px;max-width:320px;min-width:240px;
    font-size:13px;line-height:1.7;box-shadow:0 12px 32px rgba(0,0,0,.2);
    opacity:0;pointer-events:none;transform:translateY(4px);transition:all .15s;
  }
  .dict-pop.open{opacity:1;pointer-events:auto;transform:translateY(0)}
  .dict-word{font-weight:700;font-size:15px;margin-bottom:2px}
  .dict-ipa{font-size:12px;color:#FFD188;font-family:monospace;margin-bottom:8px}
  .dict-def{font-size:13px;color:#E8E8EC}

  /* ─── FLOATING METHODOLOGY BUTTON ─── */
  .fab{
    position:fixed;bottom:24px;right:24px;
    background:var(--beiya);color:#fff;padding:12px 18px;border-radius:26px;
    font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 6px 20px rgba(192,57,43,.3);
    display:flex;align-items:center;gap:8px;z-index:30
  }
  .fab:hover{background:var(--beiya-dark);transform:translateY(-2px)}

  .demo-banner{
    background:#FFF4E6;border:1px dashed #E8B87A;color:#8A5A10;
    padding:10px 16px;border-radius:8px;font-size:12px;margin-bottom:18px;
    display:flex;align-items:center;gap:10px
  }
  .demo-banner::before{content:'🎬';font-size:16px}

  @media (max-width:768px){
    .xrefs{grid-template-columns:1fr}
    .wrap{padding:16px}
    .q-header{padding:20px 18px}
    .sec-body{padding:14px 16px}
    .nav{display:none}
    .search{width:140px}
    .search:focus{width:180px}
  }
</style>

<script>
try{ if(localStorage.getItem('beiya_authed')!=='1') location.href='学生端_登录_v1.html'; }catch(e){}

// ═══ 老师后台编辑覆盖层（读 localStorage.beiya_edits）═══
(function applyAdminEdits(){
  try {
    const edits = JSON.parse(localStorage.getItem('beiya_edits') || '{}');
    if (!Object.keys(edits).length) return;
    const origGetQ = window.getQ;
    window.getQ = function(gid){
      const q = origGetQ(gid); if (!q) return q;
      const ov = edits[gid]; if (!ov) return q;
      const merged = Object.assign({}, q);
      ['title','category','group','q_num_in_group','prep_words','S1','S2','S3','S4','S1_marker','S2_marker','S3_marker','S4_marker'].forEach(k => { if (ov[k] !== undefined) merged[k] = ov[k]; });
      return merged;
    };
    const origTiers = window.TIERS || {};
    const wrapped = {};
    for (const key in origTiers) {
      const gid = Number(key); const ov = edits[gid];
      if (!ov) { wrapped[key] = origTiers[key]; continue; }
      const m = Object.assign({}, origTiers[key]);
      if (ov.ref !== undefined) m.ref = ov.ref;

  } catch(e) {}
})();

// tier 内容渲染 · 读 window.TIERS → 按 S1-S4 渲染真实内容；空则返回空字符串（上层 fallback 到 stub）

  }).join('');
}
const TIER_HINTS={cn:'建立框架认知 · 弱基础第一次看用',prompt:'脚手架引导 · 有点框架但想不起内容时',standard:'内容本身 · 学习和记诵用',detailed:'表达精进 · 6.5+ 冲刺多样性',minimal:'考前闪回 · 30 秒关键词复现'};

function getGender(){ try{ return localStorage.getItem('beiya_gender') || 'female'; }catch(e){ return 'female'; } }
function swapGender(s){
  if (getGender() !== 'male' || s == null) return s;

  s = s.replace(/\bLucy\b/g, 'Mark');

  s = s.replace(/\bShe\b/g, 'He').replace(/\bshe\b/g, 'he');

function renderAlts(s){

function xrefs(q){const same=(getQsByStory(q.group)||[]).filter(x=>x.global_id!==q.global_id);return `<div class="xrefs"><div class="xref" onclick="location.href='${q.story_file}'"><div class="xref-lbl">所属故事</div><div class="xref-main">${q.story_emoji} ${esc(q.group)}</div><div class="xref-sub">同故事下还有 ${same.length} 道题可以用这套素材。点击查看全部。</div></div><div class="xref" onclick="location.href='学生端_复现元素页_v1.html'"><div class="xref-lbl">本题涉及的复现元素</div><div class="xref-main">点击元素查看它可用于哪些题</div><div class="elem-list">${(q.group_keywords||[]).slice(0,6).map(k=>`<span class="elem">${esc(k)}</span>`).join('')}</div></div></div>`;}
function render(){const gid=getQParam(),q=getQ(gid),app=document.getElementById('app');if(!q){app.innerHTML=`<div style="padding:80px;text-align:center;color:var(--ink-3)">题目 Q${gid} 不存在<br><a href="学生端_素材宇宙首页_v1.html" style="color:var(--beiya)">← 返回首页</a></div>`;return;}

// ═══ 进度持久化 · localStorage ═══
window.BEIYA_PROGRESS_KEY = 'beiya_progress';
window.getProgress = function(){
  try { return JSON.parse(localStorage.getItem(BEIYA_PROGRESS_KEY) || '{}'); } catch(e) { return {}; }
};
window.saveProgress = function(p){
  try { localStorage.setItem(BEIYA_PROGRESS_KEY, JSON.stringify(p)); } catch(e) {}
};
window.setQProgress = function(gid, patch){
  const p = getProgress();
  p[gid] = Object.assign({}, p[gid]||{}, patch, { last: Date.now() });
  saveProgress(p);
};

};
// 首次访问题目时写入 last（无状态变化也算"刷过"）
window.touchQ = function(gid){

  saveProgress(p);
};

(function restoreState(){

  if (qp.fav) {

window.toggleFav = function(){
  const b = document.getElementById('btn-fav');
  b.classList.toggle('on'); b.classList.toggle('fav');
  const on = b.classList.contains('on');
  b.textContent = on ? '⭐ 已收藏' : '⭐ 收藏';
  setQProgress(getQParam(), { fav: on });

window.setState = function(s){
  ['done','review','reset'].forEach(k=>{
    const b = document.getElementById('btn-'+k);

  });
  const b = document.getElementById('btn-'+(s||'reset'));

};
