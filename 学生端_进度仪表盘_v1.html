<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>北雅 P2 · 我的进度仪表盘</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --beiya:#C0392B;--beiya-dark:#9B2C20;--beiya-soft:#FDECEA;
    --gold:#B8894A;--gold-soft:#FBF4EA;--gold-dark:#9A6F35;
    --ink:#1E1E22;--ink-2:#4A4A52;--ink-3:#8A8A92;
    --line:#E8E8EC;--bg:#FAFAFA;--white:#FFFFFF;
    --ok:#2E7D32;--ok-bg:#E8F5EE;--pending:#E8834A;--pending-bg:#FFF2E5;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Inter','PingFang SC','Microsoft YaHei',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.7;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none;cursor:pointer}

  /* TOP BAR */
  .topbar{position:sticky;top:0;z-index:40;background:var(--white);border-bottom:1px solid var(--line);padding:14px 24px;display:flex;align-items:center;gap:18px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;color:var(--beiya);white-space:nowrap}
  .brand-mark{width:28px;height:28px;background:var(--beiya);color:#fff;display:flex;align-items:center;justify-content:center;border-radius:4px;font-family:'Noto Serif SC',serif;font-size:14px}
  .nav{display:flex;gap:2px;margin-left:8px;flex:1}
  .nav a{padding:7px 14px;border-radius:6px;font-size:13px;color:var(--ink-2);font-weight:500;white-space:nowrap}
  .nav a:hover{background:var(--beiya-soft);color:var(--beiya)}
  .nav a.active{background:var(--beiya);color:#fff}

  .wrap{max-width:1120px;margin:0 auto;padding:28px 24px 80px}
  .crumb{font-size:12.5px;color:var(--ink-3);margin-bottom:18px;letter-spacing:.3px}
  .crumb a:hover{color:var(--beiya)}

  /* HERO · 今日进度 */
  .hero{
    background:linear-gradient(135deg,var(--beiya) 0%,var(--beiya-dark) 100%);
    color:#fff;border-radius:18px;padding:28px 32px;margin-bottom:22px;
    position:relative;overflow:hidden
  }
  .hero::before{content:'';position:absolute;top:-80px;right:-80px;width:300px;height:300px;
    background:radial-gradient(circle,rgba(255,255,255,.12) 0%,transparent 70%);pointer-events:none}
  .hero-title{font-family:'Noto Serif SC',serif;font-size:20px;font-weight:700;margin-bottom:4px;position:relative;z-index:2}
  .hero-sub{font-size:13px;opacity:.85;margin-bottom:22px;position:relative;z-index:2}
  .hero-row{display:flex;gap:28px;flex-wrap:wrap;position:relative;z-index:2}
  .hero-stat{flex:1;min-width:140px}
  .hero-num{font-family:'Noto Serif SC',serif;font-size:44px;font-weight:700;line-height:1}
  .hero-lbl{font-size:12.5px;opacity:.8;margin-top:4px;letter-spacing:.3px}

  /* 总进度环 + 故事进度 */
  .grid{display:grid;gap:16px;grid-template-columns:1fr 1fr;margin-bottom:22px}
  @media (max-width:840px){.grid{grid-template-columns:1fr}}
  .card{background:var(--white);border:1px solid var(--line);border-radius:14px;padding:22px 24px}
  .card-title{font-size:13px;font-weight:700;color:var(--beiya);text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px;display:flex;align-items:center;gap:6px}
  .card-title .hint{margin-left:auto;font-weight:400;font-size:11px;color:var(--ink-3);text-transform:none;letter-spacing:0}

  /* 故事进度条 */
  .story-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px dashed var(--line)}
  .story-row:last-child{border-bottom:none}
  .story-row .emoji{font-size:20px;width:28px;text-align:center}
  .story-row .name{font-size:13.5px;font-weight:600;color:var(--ink);min-width:100px}
  .story-row .bar{flex:1;background:var(--line);border-radius:8px;height:10px;overflow:hidden;position:relative}
  .story-row .bar-fill{background:linear-gradient(90deg,var(--ok) 0%,#7DB57D 100%);height:100%;border-radius:8px;transition:width .4s}
  .story-row .num{font-size:12px;color:var(--ink-3);min-width:60px;text-align:right;font-weight:500}

  /* 收藏 / 待复习 列表 */
  .q-list{margin-top:8px}
  .q-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px dashed var(--line);cursor:pointer;transition:all .12s;border-left:3px solid transparent;padding-left:8px;margin-left:-8px}
  .q-item:last-child{border-bottom:none}
  .q-item:hover{background:var(--beiya-soft);border-left-color:var(--beiya);border-radius:4px}
  .q-item .qn{background:var(--beiya);color:#fff;font-family:'Noto Serif SC',serif;font-weight:700;width:30px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11.5px;flex-shrink:0}
  .q-item .qt{font-size:13px;color:var(--ink-2);line-height:1.4;flex:1}
  .q-item .story-em{font-size:14px;flex-shrink:0;opacity:.7}
  .q-empty{color:var(--ink-3);font-style:italic;font-size:13px;text-align:center;padding:28px 0}

  /* 故事覆盖一览 */
  .coverage-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px dashed var(--line);font-size:13px}
  .coverage-row:last-child{border-bottom:none}
  .coverage-row .pill{background:var(--ok-bg);color:var(--ok);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
  .coverage-row .pill.zero{background:var(--line);color:var(--ink-3)}

  /* 最近活动 */
  .timeline{margin-top:8px}
  .tl-row{display:flex;gap:10px;padding:9px 0;border-bottom:1px dashed var(--line);font-size:12.5px;cursor:pointer}
  .tl-row:hover{background:var(--beiya-soft);border-radius:4px;padding-left:8px;margin-left:-8px}
  .tl-row:last-child{border-bottom:none}
  .tl-time{color:var(--ink-3);min-width:60px;font-size:11.5px;padding-top:1px}
  .tl-main{flex:1;color:var(--ink-2)}
  .tl-state{font-size:11px;padding:1px 8px;border-radius:10px;font-weight:600;flex-shrink:0}
  .tl-state.done{background:var(--ok-bg);color:var(--ok)}
  .tl-state.review{background:var(--pending-bg);color:var(--pending)}
  .tl-state.fav{background:var(--gold-soft);color:var(--gold-dark)}
  .tl-state.view{background:#F4F4F6;color:var(--ink-3)}

  /* 重置按钮 */
  .reset-btn{margin-top:12px;padding:8px 14px;background:#F4F4F6;color:var(--ink-3);border:none;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit}
  .reset-btn:hover{background:#FEE;color:#c00}

  /* CTA bar */
  .cta-bar{background:linear-gradient(135deg,var(--gold-soft) 0%,#FDF7EC 100%);border:1px solid #EAD9B8;border-radius:12px;padding:16px 22px;margin-bottom:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .cta-bar .ico{font-size:24px}
  .cta-bar .body{flex:1;font-size:13px;color:var(--ink-2);line-height:1.6}
  .cta-bar .body strong{color:var(--gold-dark)}
  .cta-bar .btn{background:var(--beiya);color:#fff;padding:8px 16px;border-radius:6px;font-size:12.5px;font-weight:600;cursor:pointer;border:none;font-family:inherit}
  .cta-bar .btn:hover{background:var(--beiya-dark)}

  /* ═══ 手机端响应式适配 ═══ */
  @media (max-width: 640px) {
    html{font-size:14px}
    body{line-height:1.6}

    /* 顶栏压缩 */
    .topbar{padding:10px 12px !important;gap:8px !important;flex-wrap:wrap;position:sticky;top:0}
    .topbar .brand{font-size:13px !important}
    .topbar .brand-mark{width:24px;height:24px;font-size:12px}
    .topbar .nav{flex:1 1 100% !important;order:3;overflow-x:auto;scrollbar-width:none;gap:0 !important;padding:4px 0;border-top:1px solid var(--line,#E8E8EC);margin:8px 0 0 !important}
    .topbar .nav::-webkit-scrollbar{display:none}
    .topbar .nav a{padding:6px 10px !important;font-size:12px !important;flex-shrink:0;white-space:nowrap}
    .search-wrap{display:none !important}
    .role-sw{margin:0 !important;order:2}
    .role-opt{padding:3px 8px !important;font-size:11px !important}

    /* 主体 padding 减小 */
    .wrap{padding:14px 12px 70px !important;max-width:100% !important}
    .crumb{font-size:11.5px !important;margin-bottom:12px !important}

    /* 所有 grid 一列化 */
    .q-grid, .grid, .story-grid, .jump-mini-grid{grid-template-columns:1fr !important}
    .row2, .row3{grid-template-columns:1fr !important}

    /* 故事首页 - 故事卡 */
    .story, .story.flagship, .story.runner-up{padding:18px !important}
    .story .story-name{font-size:20px !important}
    .entries{grid-template-columns:1fr !important}

    /* 故事页 story-head */
    .story-head{padding:20px !important;gap:16px !important}
    .sh-emoji{font-size:58px !important;width:70px !important;height:70px !important}
    .sh-name{font-size:22px !important}
    .sh-desc{font-size:13px !important}
    .sh-stats{gap:10px !important}
    .sh-stat{padding-right:10px !important}
    .sh-stat-num{font-size:16px !important}

    /* 故事页 core-strip 分组 */
    .core-group{flex-direction:column !important;align-items:stretch !important;padding:12px 0 0 !important}
    .core-group-label{min-width:0 !important;padding-top:0 !important;margin-bottom:8px !important;font-size:11px !important}
    .core-group-list{gap:10px !important}
    .core-strip-title .hint{display:none}

    /* gold-strip */
    .gold-strip{padding:14px 16px !important}
    .gs-grid{gap:6px !important}
    .gs-chip{padding:6px 10px !important;font-size:12px !important}

    /* filter-row */
    .filter-row{gap:5px !important}
    .filter-chip{padding:5px 10px !important;font-size:11.5px !important}

    /* Q 卡片 */
    .q-card{padding:14px 16px !important}
    .qc-title{font-size:13px !important}
    .qc-hook{font-size:12px !important}

    /* 详情页 q-header */
    .q-header{padding:14px 16px !important;margin-bottom:16px !important}
    .q-title-en{font-size:15px !important;line-height:1.5 !important}
    .q-tags{flex-wrap:wrap !important;gap:5px !important}
    .tag{font-size:11px !important;padding:2px 8px !important}
    .q-actions{flex-wrap:wrap !important;gap:5px !important}
    .act{padding:5px 9px !important;font-size:11.5px !important}

    /* prep-strip */
    .prep-strip{flex-wrap:wrap !important;padding:10px 12px !important;gap:5px !important}
    .prep-chip{font-size:12px !important;padding:3px 8px !important}
    .prep-label{font-size:11px !important}

    /* tier-tabs (详情页) */
    .tier-tabs{overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap !important;padding-bottom:4px;margin-bottom:14px !important}
    .tier-tabs::-webkit-scrollbar{display:none}
    .tier-tab{padding:7px 11px !important;font-size:12px !important;white-space:nowrap;flex-shrink:0 !important}

    /* outline sections */
    .outline{padding:16px !important}
    .sec{padding:14px !important}
    .sec-body{font-size:13.5px !important}
    .bullet{padding:5px 0 5px 20px !important;font-size:13.5px !important}

    /* 参考范文 */
    .ref-body{padding:16px 18px !important;font-size:13.5px !important;line-height:1.8 !important}

    /* xrefs */
    .xrefs{grid-template-columns:1fr !important}
    .xref{padding:14px !important}

    /* Hero (仪表盘) */
    .hero{padding:22px !important;border-radius:14px !important}
    .hero-num{font-size:30px !important}
    .hero-row{gap:14px !important}
    .hero-stat{min-width:100px !important}

    /* FAB 方法论按钮 */
    .fab{bottom:18px !important;right:18px !important;padding:10px 14px !important;font-size:12px !important}

    /* jump-mini */
    .jump-mini{padding:16px !important}

    /* 登录页 */
    .login-wrap, .login-card{padding:24px !important;max-width:100% !important;margin:0 12px !important}

    /* 传统分类页 / 复现元素页 */
    .tab-bar{flex-wrap:wrap !important}
    .asset-grid{grid-template-columns:1fr 1fr !important}

    /* 方法论页 · 各种 sec 排版 */
    .mtd-hero{padding:24px 18px !important}
    .mtd-hero h1{font-size:22px !important}

    /* 仪表盘 card padding 减小 */
    .card{padding:16px !important}
    .card-title{font-size:12px !important}

    /* 通用 padding 缩减 */
    .panel, .panel-section, .cta-bar{padding:14px 16px !important}
  }

</style>
</head>

<header class="topbar">
  <div class="brand"><div class="brand-mark">北</div><span>北雅国际教育</span></div>
  <nav class="nav">

    <a href="学生端_传统分类页_v1.html">📋 传统分类</a>
    <a href="学生端_复现元素页_v1.html">🏷️ 复现元素</a>

<main class="wrap">
  <div class="crumb"><a href="学生端_素材宇宙首页_v1.html">🌌 素材宇宙</a> › <span>⭐ 我的进度仪表盘</span></div>

  <!-- HERO: 今日进度 -->
  <section class="hero">
    <div class="hero-title">📅 <span id="today-date">--</span> · <span id="greeting">今天加油</span></div>
    <div class="hero-sub">你的 P2 口语素材宇宙刷题进度</div>
    <div class="hero-row">
      <div class="hero-stat"><div class="hero-num" id="s-today">0</div><div class="hero-lbl">今日已看题数</div></div>
      <div class="hero-stat"><div class="hero-num" id="s-today-done">0</div><div class="hero-lbl">今日标记已掌握</div></div>
      <div class="hero-stat"><div class="hero-num" id="s-streak">0</div><div class="hero-lbl">连续天数 🔥</div></div>
      <div class="hero-stat"><div class="hero-num" id="s-pct">0%</div><div class="hero-lbl">总体掌握度</div></div>
    </div>
  </section>

  <!-- 下一题建议 -->
  <div class="cta-bar" id="cta-bar" style="display:none">
    <span class="ico">💡</span>
    <div class="body">
      <strong>建议下一题：</strong>
      <span id="cta-text">—</span>
    </div>
    <button class="btn" id="cta-btn">开始 →</button>
  </div>

  <!-- 总览三列 -->
  <div class="grid">
    <div class="card">
      <div class="card-title">📊 按故事的掌握度 <span class="hint">已掌握 / 总题数</span></div>
      <div id="story-bars"></div>

    <div class="card">
      <div class="card-title">⭐ 我的收藏 <span class="hint" id="fav-hint">0 题</span></div>
      <div class="q-list" id="fav-list"></div>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="card-title">↻ 待复习 <span class="hint" id="review-hint">0 题</span></div>
      <div class="q-list" id="review-list"></div>
    </div>
    <div class="card">
      <div class="card-title">🎯 最近活动 <span class="hint">最近访问 / 标记的题</span></div>
      <div class="timeline" id="timeline"></div>
    </div>
  </div>

  <!-- 工具 -->
  <div style="margin-top:10px;text-align:right">
    <button class="reset-btn" onclick="if(confirm('确定重置所有进度数据？无法撤销。')){localStorage.removeItem('beiya_progress');localStorage.removeItem('beiya_streak');location.reload();}">🗑 重置全部进度数据</button>
  </div>

</main>

<script src="data.js"></script>
<script src="tiers.js"></script>
<script>
// ═══ 读取进度 ═══
function getProgress(){
  try { return JSON.parse(localStorage.getItem('beiya_progress') || '{}'); } catch(e) { return {}; }
}
function isToday(ts){
  if(!ts) return false;
  const d = new Date(ts), now = new Date();
  return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth() && d.getDate()===now.getDate();
}
function dateStr(ts){
  if(!ts) return '--';
  const d = new Date(ts), now = new Date();
  const min = Math.floor((now - d)/60000);
  if (min < 1) return '刚刚';
  if (min < 60) return min + '分钟前';
  if (min < 24*60) return Math.floor(min/60) + '小时前';
  return Math.floor(min/60/24) + '天前';
}
function timeStr(ts){
  const d = new Date(ts);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

// ═══ 连续天数 ═══
function getStreak(){
  try {
    const raw = localStorage.getItem('beiya_streak');
    return raw ? JSON.parse(raw) : { count: 0, last: null };
  } catch(e) { return { count: 0, last: null }; }
}
function updateStreakIfTouchedToday(progress){
  const touched = Object.values(progress).some(p => p.last && isToday(p.last));
  if (!touched) return getStreak();
  const s = getStreak();
  const today = new Date(); today.setHours(0,0,0,0); const todayTs = today.getTime();
  if (s.last === todayTs) return s;
  if (s.last === todayTs - 86400000) s.count++; else s.count = 1;
  s.last = todayTs;
  localStorage.setItem('beiya_streak', JSON.stringify(s));
  return s;
}

// ═══ 渲染 ═══
function render(){
  const progress = getProgress();
  const P2 = window.P2_DATA || [];
  const STORIES = window.STORIES || [];

  // Hero
  const now = new Date();
  document.getElementById('today-date').textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
  const hr = now.getHours();
  document.getElementById('greeting').textContent = hr<6?'凌晨加油':hr<11?'早上好':hr<14?'中午好':hr<18?'下午好':hr<22?'晚上好':'夜深了';

  const todayTouched = Object.entries(progress).filter(([gid,p]) => isToday(p.last));
  const todayDone = todayTouched.filter(([gid,p]) => p.state === 'done');
  document.getElementById('s-today').textContent = todayTouched.length;
  document.getElementById('s-today-done').textContent = todayDone.length;

  const streak = updateStreakIfTouchedToday(progress);
  document.getElementById('s-streak').textContent = streak.count + ' 天';

  const totalDone = Object.values(progress).filter(p => p.state === 'done').length;
  const totalPct = Math.round(totalDone / P2.length * 100);
  document.getElementById('s-pct').textContent = totalPct + '%';

  // CTA 下一题建议：未看过的第一道
  const allSeen = new Set(Object.keys(progress).map(Number));
  const nextQ = P2.find(q => !allSeen.has(q.global_id));
  if (nextQ) {
    document.getElementById('cta-bar').style.display = 'flex';
    document.getElementById('cta-text').textContent = `Q${nextQ.global_id} · ${nextQ.story_emoji} ${nextQ.group} · ${nextQ.title}`;
    document.getElementById('cta-btn').onclick = () => location.href = '题目详情_v1.html?q=' + nextQ.global_id;
  } else {
    // 全都看过了，推荐待复习
    const reviewQ = Object.entries(progress).filter(([g,p])=>p.state==='review').sort((a,b)=>(a[1].last||0)-(b[1].last||0))[0];
    if (reviewQ) {
      const q = P2.find(x => x.global_id === Number(reviewQ[0]));
      if (q) {
        document.getElementById('cta-bar').style.display = 'flex';
        document.getElementById('cta-text').textContent = `复习 Q${q.global_id} · ${q.story_emoji} ${q.group} · ${q.title}`;
        document.getElementById('cta-btn').onclick = () => location.href = '题目详情_v1.html?q=' + q.global_id;
      }
    }
  }

  // 按故事掌握度
  const storyBars = document.getElementById('story-bars');
  storyBars.innerHTML = STORIES.map(s => {
    const qs = P2.filter(q => q.group === s.name);
    const doneCount = qs.filter(q => (progress[q.global_id]||{}).state === 'done').length;
    const pct = qs.length ? Math.round(doneCount/qs.length*100) : 0;
    return `<div class="story-row">
      <span class="emoji">${s.emoji}</span>
      <span class="name">${s.name}</span>
      <div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div>
      <span class="num">${doneCount}/${qs.length} · ${pct}%</span>
    </div>`;
  }).join('');

  // 收藏列表
  const favs = Object.entries(progress).filter(([g,p])=>p.fav).map(([g])=>Number(g));
  const favList = document.getElementById('fav-list');
  document.getElementById('fav-hint').textContent = favs.length + ' 题';
  if (favs.length === 0) {
    favList.innerHTML = '<div class="q-empty">还没有收藏题目 · 点⭐收藏看到这里</div>';
  } else {
    favList.innerHTML = favs.slice(0,8).map(gid => {
      const q = P2.find(x => x.global_id === gid);
      if (!q) return '';
      return `<div class="q-item" onclick="location.href='题目详情_v1.html?q=${gid}'">
        <span class="qn">Q${gid}</span>
        <span class="story-em">${q.story_emoji}</span>
        <span class="qt">${q.title}</span>
      </div>`;
    }).join('');
    if (favs.length > 8) favList.innerHTML += `<div style="text-align:center;margin-top:8px;font-size:12px;color:var(--ink-3)">还有 ${favs.length-8} 题…</div>`;
  }

  // 待复习
  const reviews = Object.entries(progress).filter(([g,p])=>p.state==='review').map(([g])=>Number(g));
  const reviewList = document.getElementById('review-list');
  document.getElementById('review-hint').textContent = reviews.length + ' 题';
  if (reviews.length === 0) {
    reviewList.innerHTML = '<div class="q-empty">还没有待复习 · 点↻ 标记复习的题会显示在这</div>';
  } else {
    reviewList.innerHTML = reviews.slice(0,8).map(gid => {
      const q = P2.find(x => x.global_id === gid);
      if (!q) return '';
      return `<div class="q-item" onclick="location.href='题目详情_v1.html?q=${gid}'">
        <span class="qn">Q${gid}</span>
        <span class="story-em">${q.story_emoji}</span>
        <span class="qt">${q.title}</span>
      </div>`;
    }).join('');
    if (reviews.length > 8) reviewList.innerHTML += `<div style="text-align:center;margin-top:8px;font-size:12px;color:var(--ink-3)">还有 ${reviews.length-8} 题…</div>`;
  }

  // 最近活动
  const recent = Object.entries(progress)
    .filter(([g,p])=>p.last)
    .sort((a,b)=>b[1].last-a[1].last)
    .slice(0,10);
  const timeline = document.getElementById('timeline');
  if (recent.length === 0) {
    timeline.innerHTML = '<div class="q-empty">还没有活动记录 · 打开任何题目后会在这显示</div>';
  } else {
    timeline.innerHTML = recent.map(([gid, p]) => {
      const q = P2.find(x => x.global_id === Number(gid));
      if (!q) return '';
      const stateLabels = {done:['done','已掌握'], review:['review','待复习']};
      const sl = stateLabels[p.state];
      const stateChip = p.fav ? '<span class="tl-state fav">⭐</span>' : '';
      const statusChip = sl ? `<span class="tl-state ${sl[0]}">${sl[1]}</span>` : '<span class="tl-state view">看过</span>';
      return `<div class="tl-row" onclick="location.href='题目详情_v1.html?q=${gid}'">
        <span class="tl-time">${dateStr(p.last)}</span>
        <span class="tl-main">${q.story_emoji} Q${gid} · ${q.title.slice(0,40)}${q.title.length>40?'…':''}</span>
        ${stateChip}${statusChip}
      </div>`;
    }).join('');
  }
}

// 启动
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', render);
else render();
</script>
</body>
</html>
